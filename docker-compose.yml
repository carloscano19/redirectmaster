version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AUTO_APPROVE_THRESHOLD=85
      - MAX_URLS_PER_REQUEST=100000
      - LEVENSHTEIN_WEIGHT=0.35
      - COSINE_WEIGHT=0.40
      - STRUCTURAL_WEIGHT=0.25
      - CORS_ORIGINS=http://localhost:3000,http://localhost
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
